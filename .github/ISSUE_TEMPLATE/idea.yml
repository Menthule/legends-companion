name: Suggest an idea
description: Share a feature or improvement for Legends Companion.
title: "[Idea] "
labels: ["feedback", "enhancement", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Show us the play problem first, then the feature you have in mind. Screenshots and quick sketches are welcome.
  - type: textarea
    id: details
    attributes:
      label: What would make the app better?
      description: Paste text, screenshots, or a sketch with Ctrl+V. You can also drag and drop files into this box.
      placeholder: While I am playing, I want to ... because ...
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: What would a good solution look like?
      description: Optional—describe the workflow, overlay, or screen you imagine.
  - type: upload
    id: attachments
    attributes:
      label: Screenshots, sketches, or video
      description: Optional. Browse for files here, or paste/drag them into the description above.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: App version
      description: Prefilled when you open this form from the app.
      placeholder: v3.0.3
  - type: input
    id: os
    attributes:
      label: Platform
      description: Prefilled when you open this form from the app.
      placeholder: Windows
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed the report and removed anything I do not want posted publicly.
          required: true
