name: Report a missing trigger
description: Give us the exact EQ message for a missing timer, condition, alert, or highlight.
title: "[Trigger] "
labels: ["feedback", "trigger-data", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Exact game text is the fastest route to a reliable trigger. Please include the complete message, including punctuation, and redact player names if needed.
  - type: textarea
    id: logtext
    attributes:
      label: Exact EverQuest message
      description: Copy the complete line exactly as it appeared. Add more than one line when the effect has a start and an end message.
      placeholder: You feel a heal blooming within you.
      render: text
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What should the Companion show or do?
      description: Tell us whether this should be a timer, condition, important alert, highlight, impact, or something else. Paste screenshots with Ctrl+V here.
      placeholder: Start a 24-second buff timer and warn me three seconds before it expires.
    validations:
      required: true
  - type: upload
    id: attachments
    attributes:
      label: Screenshot or video
      description: Optional. Browse for files here, or paste/drag them into the behavior box above.
    validations:
      required: false
  - type: input
    id: classlevel
    attributes:
      label: Class and level
      placeholder: Druid 30
  - type: input
    id: version
    attributes:
      label: App version
      description: Prefilled when you open this form from the app.
      placeholder: v3.0.3
  - type: input
    id: os
    attributes:
      label: Platform
      description: Prefilled when you open this form from the app.
      placeholder: Windows
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed the report and removed anything I do not want posted publicly.
          required: true
